源一路泉聲入耳喧巖畔蒼松千歲古洞前瑶草四時繁龍潛幽壑生雲氣龜斷荒碑積蘚䀶便欲飄然避塵世採芝何處訪東園夜宿崇明寺舊寓二十年前逐隊行重來蕭寺不勝情入門寒月侵階白俯檻浮雲與塔平燈下漫傾新貰酒壁間還認舊題名夜寒禪榻凄涼甚一枕黃粱夢不成南都歸途中作整裝晨向板輿升物外雲遊近類僧浪迹自同狂北阮微行誰識舊東陵吳中别業應歸去白下名山惜未登非敢清時即長往依違恐負丈夫稱虎邱訪僧不遇停橈徐步扣禪關門掩松隂白日間坐對寒雲時悵望蕭條落葉滿空山南樓曉望曉向南樓望陽光動綺疏蛛絲盈几案鳥迹汙琴書曝背難為獻間心只自如仲冬風日好聊此稱幽居送王大參同年南還二首當年邂逅大江濵䇿馬看花上苑春宦轍從來途路險故鄉歸去歲華新東風舊宅仍栽柳細雨芳洲更采蓴别酒莫辭頻勸飲與君俱是倦遊人江城送客日西斜一片孤帆去永嘉澤國舟中無薏苡官橋雪後有梅花故人惜别重攜手遊子先春擬到家鐘鼎山林俱夢幻好將詩酒弄煙霞郊居晨起即事郊居時晏起寒色動柴門日出雞豚散庭空鳥雀喧斷煙棲木杪殘雪擁籬根曝背南簷下狐裘漸覺溫山行口占湖鄉歲晚倚蘭橈山背隂隂雪未消間向官橋時問信春光先露早梅梢月夜渡湖過虎山橋一葦風生過五湖山橋此夜月同孤天浮皓魄連銀漢波漾流光注玉壺荻渚漁歌時互答沙汀鴈宿自相呼優遊物外渾無纍且覓髙陽舊酒徒元日元日還新霽東風上栁條逺山嵐半吐積水凍全消寶鼎香焚柏金樽酒頌椒衰年逢令節清興覺偏饒送王古菴侍御之夜郎金閶門外柳條春客斾悠悠指去津江畔寒梅迎棹發天涯芳草映袍新憐君舊是烏臺使老我今為白社民别酒臨行須強飲雲山萬里共誰親間過靈殿寺看梅古寺荒涼煙景賒竹林深處是僧家老梅不識寒暄態依舊春開幾樹花春日攜榼同顧陸二文學往北寺野望雙樹尋芳坐孤梅發興新日斜幡影墜春入鳥聲頻陌上韶光動樽前趣味真年來逃世網偏覺故人親晨起何處雞聲枕上聞碧紗窗外曙初分庭花欲發含朝露海日將生散曉雲解組久同南郭隱守株無愧北山文殘生病後堪行樂不羡區區竹帛勛病起小齋即事不到名園久春殘花事稀林香還入坐草色欲沾衣喬木干青漢層臺落翠微平生耽勝賞日暮竟忘歸夜宿山房客座傳杯罷禪房借榻眠小樓靑嶂曲髙枕白雲邊寶剎諸天近瑶臺片月圎幽棲塵事逺積久足延年月下與客同步散步千人石鐘鳴夜未闌雲歸山閣暝月浸劒池寒花氣侵衣薄松風吹酒殘病餘難久立長嘯倚危闌山房晚坐山中初病起三宿逺公房避俗尋蓮社全生禮藥王泉流穿澗冷花落染塵香對此逍遙坐將迎意盡忘山房曉起簡同遊諸君無端夜雨五更寒紙帳聞雞客夢殘松籟風微還入座花隂日上漸過闌漫言桑下逾三宿還喜樽前聚二難乘興忘歸君莫訝萬金那易一身間後苑層樓登覽髙閣連雲起層軒逼水開簷前芳樹繞座上逺山來景向春城聚詩從暮雨催家園增勝槩竟日此徘徊立夏日後苑漫題倐忽流光春又徂朝來病骨強支吾輕煙風揚時髙下細雨雲移乍有無深竹鶯遷簾外語平湖鳥下鏡中呼景隨物換留無計斷送餘生酒一壺初夏南園雜興一首南苑逢初夏薔薇滿架花幽香微帶雨麗色爛蒸霞地擬東山勝樽開北海賒謝公行樂處沉醉岸烏紗夏日過劉秀才村居訪舊青郊外停舟緑水濵景臨初夏日情是故鄉親杯酒論文久園林發興新相看頭盡白來往莫嫌貧無錫城下夜泊沙洲維畫舸獨坐向黃昏月委溪流湧風隨麥浪翻烏棲城下栁犬吠水邊村心事憑誰語惟須酒一樽與客同登吳氏園樓髙閣憑闌坐川原一望分庭花晴媚日林木上干雲山色侵窗入鳩聲隔竹聞論文兼話舊不覺酒微醺晚發岊亭客路通宵雨河橋柳色靑水深新荻渚煙暗古郵亭對鏡冠慵整憑闌酒未醒年來困塵網華髮漸星星毗陵道中二首揚帆初雨霽縹眇向毗陵雲斂山仍出沙虛岸欲崩渚花迎雀舫堤柳挂魚罾歸路梁溪近名山擬共登路出晉陵西城懸落日低鷗驚漁棹起烏向女牆棲水竹由來美煙花望欲迷因思漆園吏吾道付醯雞南園散步向晚開三徑薰風灑客裳修篁新脫粉幽草暗生香水溢羣魚泳林深百鳥藏間來觀物理不覺意俱忘郊居口號二首懶性優遊鹿豕羣間將杯酒對南薰醉來髙卧北窗下松竹蕭蕭鎖白雲課僕晨耕負郭田坐憐喬木午參天也知冠蓋京華客輸我林間一醉眠送馬大參同年北上一片征帆帶夕暉官橋煙柳暮依依别時紅蓼迷江渚到日黃花滿帝畿命下喜生毛義檄夢回驚覩老萊衣知君才力猶強健肯向明時暫息機吳江訪李中丞晚歸二首訪舊攜孤棹江城落照紅暮林投倦鳥秋水偃長虹燈起荒郊外帆飛細雨中三髙不可作千載仰遺風畫船時載酒銀燭夜生花老去身逾懶秋來興每佳朗吟歌白雪沉醉岸烏紗舟子兼程進更深未到家琴川夜歸百里琴川路扁舟載月歸揚帆凌皓景把酒弄清輝山斂孤雲盡河懸列宿稀更闌人醉後露下濕荷衣夜泊太倉城下醉向篷窗卧悠悠夢未成一簾秋月白孤枕夜濤聲夙有江湖興難忘魚鳥情漏催天易曉隔水又雞鳴松江道中水鄉溪屈曲蘆葦晚蕭蕭歸鴈衝殘雨行舟趁落潮新詩時易就宿酒未全消前路多村店靑旗映畫橋秋晚過西山别業艤棹臨湖曲穿雲過嶺西亂蛩吟露切歸鳥度煙迷天斂殘霞盡峰懸落日低山齋行欲到分火借靑藜天池道院小坐名山深窈窕池引細泉分樹倚將崩石峰留欲去雲幽軒含積翠古桂送清芬痛飲渾忘去微風酒漸醺贈孫將軍岐陽將軍不武類能文籍籍芳聲藝苑聞䇿蹇行吟松徑月枕書髙卧石牀雲看花酌酒秋將暮剪燭彈棊夜未分寄我新詩總珠玉山堂日日挹淸芬贈張幼于訪舊幽棲常傍白雲眠乘興時登訪戴船舊約喜從千里去新詩應擬萬人傳滄江水接天俱逺采石秋髙月正圎知向故人歡會處桂花香落酒樽前蠡東别墅籬落三秋景柴扉一徑通浩歌驚宿鳥徐步聽寒蛩橘柚霜前緑芙蓉水際紅無官真散逸何必悶書空九日與客登上方流雲亭選勝登危巘攀躋未憚勞兩山浮水出孤塔插天高湖色分漁艇林香入客袍日斜人醉後轉覺興陶陶蠡溪秋夜一池秋水浸芙蓉荒蘚如裀草徑封平楚雨收煙慘淡長空雲翳月朦朧欲逃塵網同孤鶴間向邱樊愧伏龍寂寞山窗燈火夜樽前嘯咏任疏慵孟冬日南苑即事窮日牽塵鞅因耽别業幽園林開緑野臺榭俯清流落葉飛還舞間雲去復留地偏心境寂無語倚南樓晚過王宴嶺山行逾數里一嶺界天髙疊嶂全封蘚叢林半是蒿雲歸迷鳥道風起沸松濤向晚回孤棹行厨進濁醪夜宿江樓欲覽仙巖勝遙從江上行小樓春月色孤枕夜濤聲竹葉消愁盡梅花入夢清來朝潮正長風送一帆輕八坼夜泊笠澤停橈處村醪不醉人樽前燭影墜岸上柝聲頻漸覺家山近休嫌客路貧夜來風雨急疑是妒芳辰上方流雲亭小坐日浴湖光淨山含秋氣深白雲迷古寺黃葉墜疏林水送亭中色峰移石上隂相逢此佳景杯酒醉還斟寄徐大參同年二首曽向長安步後塵倦遊歸卧五湖濵雲林自喜能容我宦海從來可畏人一枕黃梁真是夢數杯緑酒易為春百年光景今過半贏得逍遙物外身畏途日日起風波寄語君侯奈若何黃雀銜環誰復有靑蠅玷璧古來多射工沙際窺人影魑魅山中喜客過須識此中真險惡還家嘯傲舊煙蘿早春日晨起遣懷斗帳孤眠怯曉寒起看紅日已三竿誰憐病後腰肢小自覺間來心境寬柳色弄晴煙未散梅花破冷雪初殘從教春滿西郊外繞路芳菲簇錦鞍早春日自遣東風披拂凍全消漸覺煙光動柳條病後未須拋藥裹春來還喜整蘭橈山中蘿薜原相約湖上梅花早見招自分逍遙謝塵鞅但將詩酒過清朝春夜病骨偏宜睡呼童早閉門孤燈侵夜短薄絮向春溫雨翳鐘聲杳風驚犬吠喧誰憐漢司馬今已老文園徐少參宦遊初歸賦得東園春奉寄江城佳勝在名園花木逢春各競妍鴨緑波光浮麗日鵝黃栁色弄輕煙遊人久許攜樽過舊客還容借榻眠寄語初歸東道主暫時相賞是良緣上已日雨坐遣懷上已多風雨蘭亭興已違春寒增寂寞煙景入霏微草色間侵幔苔䀶欲上衣登樓時徙倚點點暮鴉歸琴川道中虞山不到已經年此日登臨破暝煙沙岸人行殘霧裏水村花發夕陽邊白頭漸覺交遊少靑眼還應故舊憐夜向篷窗還起坐一方明月滿琴川南園口占二絶池臺久雨後芳徑生新草間上畫樓看窗裏靑山小小亭蒼翠繞與客坐移時花落靑春暮枝頭呌子規暮春日蠡東對客遣興抱病江鄉過客稀春深白日掩柴扉樽前愛坐山當户醉後何妨酒滿衣飛絮池塘魚競出落花庭院燕初歸來朝不淺登臨興著屐穿雲入翠微病中口號雨後花香入院清間來心境絶將迎一庭修竹紅塵逺竟日唯聞鳥雀聲失編和顧東白冏卿歸田倡和集原韻九重綸命下公車得許東歸意自如青瑣當年同仗馬碧山今日復焚魚三竿紅日堪消酒半榻清風稱讀書更羡臨行投贈者陽春欲和愧瓊琚金陵下第東歸石頭城下並孤舟千里關山汗漫遊行色匆忙書劒冷西風蕭颯鬢毛秋疏林黃葉連天思古驛寒花滿目愁三載相期只如此忍看蘇季黑貂裘雨後中庭夜坐槐庭秋雨霽正是納涼時雙闕銀河近千林玉露滋興隨清夜發坐為好風移此意無人解唯應達者知挽朱秀才良玉蚤歲相知筆硯同中年岐路各西東靑雲愧我身先達白首憐君志未終蕙帳徒懸秋月冷酒杯應向夜臺空臨風無限凄涼思腸斷荒煙落日中贈楊道衡姊丈當年同學在庭闈中歲離羣一鴈飛愧我風塵偏易老羡君林壑又知非玉桃薦酒娛珠履金勝傳春映綵衣共對南山頻勸飲不妨明月繞柴扉宿上宮吳道士太虛樓太虛樓閣倚層雲檻外三峰挂夕曛嵐合香煙千樹暝風飄仙籟九天聞初晴簾幕懸烏影向晚松楸下鶴羣更喜殷勤吳羽客相隨月下禮茅君山中贈楊勺泉道士仙壇久著錬師名鞭撻風雷宇內驚勺水休將容易看曽為霖雨濟蒼生哭金秀才月落江湖夜已闌故人别後見應難西風吹散清宵夢腸斷霜天雁影寒悼鶴雙鶴原從海外來幽軒日日步蒼苔未能振翮凌霄漢相繼遊魂赴夜臺雲暗江樓何處覓月明華表幾時回憑闌悵望西風下零落霜毛真可哀戲為柳枝詞贈别二首岸頭柳色近鵝黃絲短那堪别恨長寄語東風休作態天涯到處斷人腸東風昨夜消殘雪弱栁絲絲漸堪折上林春色自多情莫向河橋頻送别濠梁雜詠六首紅羅浮水産真人崛起平將六合吞掃蕩凶殘歸禮樂朗然别是一乾坤元末英雄角逐時真龍猶未出天池諸艱厯盡天方授一起時將大難夷豐沛濠梁俱帝鄉盡憑三尺定封疆本朝自用周官制不似炎劉雜霸王河山形勝昔中都佳氣千年擁帝圖多少金陵騎馬客當年曽此效工徒彭蠡鏖兵勢頗窮韓生徇節意何忠那知漢室論功日不録滎陽紀信功破曉馳驅驛路來沙邊立馬自徘徊英雄千載今誰在淮水東流不復回鯤溟詩集卷四
