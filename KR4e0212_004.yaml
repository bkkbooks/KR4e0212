body:
  text: 鯤溟詩集卷四明郭諫臣撰江村寒食故里逢寒食園林紅雨飛鶯藏新柳囀燕向舊巢歸老去遊先倦年來事覺非小窗花下坐寂寞掩柴扉解官歸過舊宅漫述宦遊湖海忽抽簪回首家山歲月侵舊識親朋多即世新栽松竹漸成林春寒花氣沾衣薄雨霽山光入座深寂寞柴門寒食後間來負却一生心春日吳郡侯枉顧山莊奉寄二首帝里看花伴相逢數載餘當年同躍馬今日獨焚魚自是愚公谷何勞長者車竹牀陪笑語漫自摘園蔬千里挂冠歸幽棲過客稀逺勞青眼顧時扣白雲扉村酒盈樽緑池魚入饌肥林花映五馬蓬蓽爛生輝贈陳雨泉方伯薇省流芳錦水春還家初見二毛新山中猿鶴時為侣筆下龍蛇似有神戲綵試看萊子孝典衣無復少陵貧聖朝耆德方推重會見安車下紫宸春日郊居縣尹陳公過訪投簪謝人事歸著芰荷衣豈謂靑雲客時過白板扉草堂論舊雨香徑藹春暉向晚回花縣雙鳬拂棹飛雨中與客遊石湖同飲盟鷗亭二首細雨春山曲淋漓溼翠屏殘紅初結子飛絮欲為萍浮蟻新多興間鷗舊有盟故人亭上坐相對眼俱靑收帆還著屐湖上繫蘭橈暮雨來吳嶂春煙翳越橋挂冠歸笠澤把酒醉花朝久已甘肥遁山翁不用招春暮過蠡塘别業江鄉春欲暮宦海客初歸紫陌風光好名園花事稀遊絲罥酒幔落絮點人衣故里間追省年來漸覺非欲遊天池阻雨乘興攜賔從將臨石上池逗留靑嶂曲空負白雲期巖雨滋花重厨煙出竹遲老僧頻進茗相對了殘棋贈别同年李侍御補郡征帆遙指五雲邊君向春江思渺然我已投簪林下隱仙舟同載是何年登虞山拂水巖髙臺解官已作吳中隱攜客同登湖上臺峭壁日穿雲竇破飛泉風拂雨珠來山光繞户開圖畫湖景浮空落酒杯乘興久拚酩酊醉林間好鳥莫頻催琴川舟中漫述薄遊數載苦無聞便欲攜家隱鹿門報國自慚心未遂還鄉祗喜舌猶存竹梧髙館書千帙煙月孤槎酒一樽且向此中求適性悠悠世態復誰論贈别王少府擢任比部佐郡餘三載徵書正及期遙乘靑雀舫前赴白雲司落日孤帆逺清風一鶴隨東南民利病應達九重知蠡東即事别業環居緑水村倚天喬木午隂繁誅茅擬構藏書屋傍竹還開聽雨軒小犬籬邊迎客吠流鶯花外似人言挂冠歸後頻來此竟日曾無車馬喧晚過蠡西舊宅與客小坐山莊新雨霽正好納涼時返照穿簾入殘雲傍席移鶴林留客處雞黍故人期溪上秋風早還來理釣絲蠡西尋舊識有客寓村莊知我停蘭棹攜樽過草堂坐深時漸暝醉後晚生涼酒散看明月清輝滿客裳秋日與袁太常顧水部蔣髙涼同集徐鴻臚園亭水國新秋日園亭欲暮時渚蓮香荏苒煙樹影參差林際月生早花間客去遲疏狂晉山簡日醉習家池吳城夜歸暮出闔閭城扁舟載月行四郊浮夜色萬籟總秋聲露浥衣襟薄風生枕簟清篷窗時假寐耿耿夢難成寄呂比部同年尺素緘題去秋風一鴈髙懸知新粉署應念舊綈袍白下分違久靑宵夢寐勞憐君公輔器擬贈呂虔刀秋日水竹居雜詠二首小景開園圃層軒俯碧池捲簾看雨竹掃徑摘秋葵社燕辭巢去寒蟬抱葉悲幽栖多野意似與道人期晨興方冠櫛旭日到柴門水漲知魚樂林深厭雀喧秋光來逺嶂爽氣滿幽軒近學漢隂老忘機日灌園秋晚梁溪道中向晚梁溪道秋光滿畫船山明低落日波淨倒涵天逺市分殘雨叢林起暮煙同行俱故舊杯酒共留連毗陵道中蘭舟載酒集髙朋縹眇孤帆指義興平楚橋臨靑嶂曲晴空塔聳白雲層沙汀水落萍還積田舍秋來黍漸登一局殘棋賔未散夕陽煙樹近毗陵園亭夜宿華屋三年别間來一駐驂移樽同勝賞下榻恣幽探林壑秋聲滿亭臺夜色含山窗燈火下相對盡沉酣蚤抵錫山苦暑竟宵征歸帆拂曙星簾垂秋水碧坐對曉山靑徙倚看漁艇微吟到驛亭此身渾似寄滄海一浮萍柏瀆夜歸天末夕陽收歸途只暝投揚舲過蠡澤失路問漁舟雨暗湖天夜風生荻岸秋宵分方抵舍燈火映靑邱湖州城下夜泊淸秋移桂楫薄暮宿苕溪雲磬來篷底煙林隔水西川原隨地勝星漢去城低欲訪山中舊前途候蚤雞宴座主董司空宅司空愛客興何長芳宴時開緑野堂皓齒滿前歌玉樹纖腰相對舞霓裳瑶觴頻勸人先醉銀燭髙燒夜未央歸卧蘭舟初夢覺羅襟猶帶酒䀶香晚過平湖縣東湖薄暮風生訪戴舟湖波遙引太空流墟煙縷縷山腰起塔影層層水面浮幾點間鷗紅蓼晚一行新鴈碧雲秋江鄉到處堪乘興莫怪明時便乞休夜歸婁門潮生荻岸平日暮蘭橈歇篷底坐移時開簾見新月秋夜獨處懷內天逺鳳樓空風清鴛帳冷不寢起憑欄月落孤松影秋晚虎邱山樓小坐水國深秋景山樓薄暮時間尋蘭若客同醉菊花巵草木行看變雲林似有期笙歌聲正沸歸棹未云遲蠡塘舟中晚眺江鄉過雨晚蕭疏霜染楓林錦不如數里煙帆漁父棹孤村水竹野人居樽攜緑醑時浮蟻囊解青錢欲買魚菊有黃花秋漸老臨風徙倚獨躊躇初冬日園亭雜興細雨園林潤初冬景亦佳蕉餘含露葉菊剩傲霜花古木臨寒水髙窗送晚霞烹茶問童子分火向鄰家冬夜與諸友同集馮郡伯園亭分得栖字名園冠蓋集坐久忽雞栖明月當空滿晴雲去樹低窗間銀燭剪松下緑樽攜到處淸輝繞歸途醉不迷贈丁侍御同年赴南都三絶滄江一棹駕長風水底魚龍亦避驄他日埋輪兼破柱始知江海有孤忠繡服霞明映豸冠臺端今日用丁寬先聲但落姦雄膽莫遣霜飛六月寒折桂當年並馬遊君今攬轡氣橫秋自慚空負澄清志宦海歸來已白頭與顧水部期登樓玩雪不赴簡一絶彤雲萬里雪漫漫門外花飛玉樹寒欲上層臺尋故約問君何事學袁安除夕百年已過半此夜歲云除消却風雲氣聊同水竹居湖山原有社政府久無書元日來朝是春風到草廬艤舟靈殿寺與客同探梅花澤國春隂久梅花尚未開疏枝含玉蕊清影落瑶臺客舫移樽至僧厨進茗來不須催几席隨意坐莓苔送王少參同年赴豫章迢遞西江路花開滿故枝君懸新綬去豫動舊遊思彭蠡春深後匡山月落時夢魂飛度處雲水隔天涯雨後登城野望雨歇天還霽沙乾路不迷亂鳩鳴竹塢飛燕掠芹泥城帶春雲潤山銜落日低醉餘時縱目芳草緑萋萋雨後南園曉望病酒連朝起較遲南園門掩日長時庭前草長多新緑雨後花開滿故枝絲揚微風罥古木水流曲徑到平池呼童為整登山屐恐負幽人石上期上已前一日與客同集虎邱山樓山樓攜客飲春色正堪憐疊嶂浮雲外明湖落檻前松門斜映日花徑暗流泉欲掃千人石欣然一醉眠春日與客同過張幼于湖上别業春風湖上駐藍輿言訪蓬蒿仲蔚居髙閣過雲浮棟宇匡牀飛雨潤琴書呼童頻進松陵釀對客時烹笠澤魚繾綣從君還竟日倦遊誰惜病相如春日訪方司訓二首訪舊攜軒從山行一徑斜春風多栁絮夜雨長蒲芽草滿王孫路雲深處士家憐君頭白盡潦倒卧煙霞不見方干久沉吟帶瘦容靑山城市逺白屋薜蘿封身向間中老交從病後慵湖山風月夜安得更相從山窗獨坐二絶日永篆煙消風寒襟袂薄間窗無客來坐久庭花落林合鳥聲頻山含花氣重春色已將闌欲寢不成夢上湖舟中春遊興未已一棹泛中流塔影波心落嵐光樹杪浮岸花紅欲盡汀草緑初稠念此頻來往壺觴共勸酬早登拂水巖肩輿侵曉發一徑入中天花落鶯聲外人行鳥道邊雲深低護石風送亂飛泉更上層巔望雙崖若劒懸山齋睡起幽齋初睡起斜日透窗明簷外羣蜂出花間一鳥鳴微吟無限思晏坐有餘清點檢殘春色憑闌詩又成初夏日與社友同集蔣髙涼宅芳辰喜良晤清酌坐花前松竹開三徑冠裳聚七賢笑談娛白髮醉眼望青天别後林光暝歸途細雨邊新夏登虎邱山閣山樓杯酒坐移時醉倚闌干日欲西芳草叢深麋鹿走殘花落盡杜鵑啼林藏宿雨枝頭重風壓輕雲水面低遊客不知春已去畫船簫鼓聚香堤贈吳少溪宮詹海內賢豪士如公復幾人棄繻遊上國彈鋏客平津意氣凌霄漢聲華動縉紳穆皇初御極潛邸昔為臣晝日方傾藿秋風忽憶蓴煙霞堪自老風月未全貧安石登山屐淵明漉酒巾竹林羣結社桃實幾經春坐客金蘭舊庭闈玉樹新陶朱同晚節方朔是前身人並推耆德時方禮逸民聖朝纁璧詔早晚下楓宸滸墅新晴雨歇芳林潤風生細浪浮河津當孔道關法阻行舟斜日蒸花氣輕寒動麥秋自嫌嬰世網空負主人留河橋曉發水村雞唱後曙色到蓬窗雲破猶隨月河斜欲墮江乘風攜畫槳分火剔銀釭殘酒時消盡詩魔未肯降集徐鴻臚園林雷聲起天末驟雨忽傾盆徑引奔泉落林棲斷靄昏殘陽催去客暝色帶清樽醉拂羅衫袖淋漓半酒䀶夏日園居獨坐經時久不到山莊數畝園居野趣長窗竹日髙斜弄影庭花風動暗浮香書拋滿架呼僮帙酒熟盈樽待客嘗獨坐更無塵慮擾蕭然真足傲羲皇南樓雨坐投間登小閣獨坐倚雕闌簾幕千村雨絺衣五月寒水聲來坐上煙景翳林端風灑侵窗竹圖書潤未乾南浦新晴散步散帙尋幽賞園林過雨新菜畦微有徑苔石淨無塵鄰犬時迎客池魚解避人壺觴隨意飲漉酒不須巾鵝湖雨後舟行雨洗湖光淨可憐逺山湖外斂輕煙離披蘆荻疑連漢浩渺蘭舟欲上天鳥逐帆飛明鏡裏漁收網挂夕陽邊呼僮釃酒消間坐散髮篷窗一醉眠毗陵舟中向晚毗陵道官橋繫短篷水迎風起浪日射雨成虹鬢逐年華白顔隨酒暈紅甘心老空谷一任笑愚公舟中望惠山往返梁溪道開簾見惠山遙憐多勝槩恨不及躋攀雲壑清泉冷松門白日間狂遊今不倦極目只空還歸舟晚眺侵星時鼓棹畢景未收帆日落煙橫浦天高月挂巖多情新緑酒落魄舊靑衫醉後清狂態憑誰笑阿咸常熟舟中落日琴川路薰風彩鷁新煙波時獨往鷗鳥自相親興豈同元亮狂疑類季真憑誰問行迹湖海一孤臣十三夜山亭玩月華館中秋夜青天片月來彤弓弦未彀寶鏡匣初開疏影穿簾幕淸光落酒杯坐深忘却倦一任漏頻催中秋夜石湖舟中無月湖上通宵坐中天月未明孤舟虛夜景萬籟自秋聲竹葉沽還進燈花剪復生故人相對飲潦倒不勝情十六夜抵虎山橋夙有山橋約今從煙水遊晴嵐浮列嶂落日漾中流寺迫諸天晚湖懸一鏡秋相看明月上談笑理觥籌秋日與客同登靈巖二首破曉登危巘行行入翠微琴臺松韻細香徑露華晞地僻幽花吐池晴浴鳥飛投間尋古迹竟日自忘歸靈巖攜上客石磴倩僮扶掬水臨雙井憑髙瞰五湖煙霞迷古洞霄漢插浮圗此地三年别重來興不孤家弟歸自秣陵攜酒同登虎邱朝來烏鵲喜天畔鶺鴒歸挈客登高閣開樽對落暉天香流綺席秋色上羅衣醉後回孤棹風帆一片飛滸墅舟中與蔣雲崖郡守夜話河梁同艤棹杯酒夜相親坐對靑燈久還驚白髮新煙霞三徑侶天地兩間人故舊論心處相看醉態真秋日與蔣使君同遊黃公澗登髙行憩樹掃石坐聽泉林谷含秋色村墟起暮煙亭依靑嶂曲酒送白雲邊飲罷天將暝歸舟醉欲眠蠡東秋夜池館深秋夜寒蛩不住鳴涼飇千里至新月一鈎明古壁殘燈影空階落葉聲藝編間檢罷獨坐有餘清秋晚南園二絶亭俯曲池中人歸殘照裏夾岸芙蓉花盈盈隔秋水幽棲謝俗緣僻性耽清賞醉後步蒼苔東林月初上南園秋暮二首暫爾塵氛逺居然心境幽遣懷頻覓句窮睇獨登樓禾黍孤村晚芙蓉夾岸秋自甘疏懶性清世愧沉浮搖落深秋後凄涼欲暮時印階多鳥篆網户總蛛絲竹圃風聲集蕉庭日影移時逢攜酒伴相與醉東籬雨後晨起即事卧聽中宵雨仍驚十月雷晨光時漸動寒色曉來催試檢狐裘在慵將鸞鏡開科頭清旭裏獨步思徘徊送長洲李明府入覲作宰君當英妙時政成應報九重知雲中宮闕雙鳬逺客裏風霜一鶴隨紫陌朝回煙未散彤庭宴罷日初移自來卓異堪殊