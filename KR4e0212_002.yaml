body:
  text: 鯤溟詩集卷二明郭諫臣撰月夜東歸雀舫乘潮發搖搖日暮歸入春新釀熟漸老故人稀臨水心如洗看雲思欲飛停舟天漸暝月色映荷衣春日約方司訓同看梅花不見故人久悠悠繫我思每當明月夜正是憶君時野寺梅初發官橋栁欲埀扁舟共清賞幸不負幽期春遊靈殿寺野寺梅開後蕭條客到稀白雲當户滿香雪繞空飛荒蘚春來合殘僧日暮歸為言征稅苦終日掩柴扉訪金文學次韻題壁故人喜我至對客摘園蔬石鼎時烹茗風簷自展書君今同隱豹豫愧未焚魚别去柴荆掩忩前月色虛春日方司訓過訪留西館夜坐佳客山中到蘭橈溪上停開軒酒正緑握手眼俱青笑語風生席酣歌月滿庭更闌望牛斗遙引少微星春日過金橋訪友留飲題壁攜舟間過陸渾莊繞路名花雨後香十里暖煙迷竹塢一篙春水沒魚梁座傾村釀因留久盤摘園蔬引話長自是主人能愛客花前同取醉餘觴春日與王比部陳考功虎邱敘别勝境頻移榼良朋喜盍簪雲房時送客花徑暫停驂萬木春藏寺諸峰晚護嵐相逢此清賞具美盡東南暮春日與客同登虎邱西閣髙閣倚巖西層軒落翠微一簾殘雨盡千頃暮雲飛天晚鳥將倦春深花漸稀移樽續勝賞潦倒頓忘歸春夜步月口占春雲輕護月香霧暖浮空院鎖鶯花夕林吹燕麥風酒憐樽易罄詩苦句難工寒食來朝是村村送落紅村居抱病連朝未破顔柴門花落晝常關呼童掃室焚香坐消受村居一味間水南别業日長庭院午風微春逺柴荆客到稀久雨園林花亂落新晴簾幕燕初飛門臨緑水堪埀釣坐對青山欲振衣屈指當今遊宦客重重甲第幾人歸夜泊南橋移樽橋上玩月湖上風生席帆收月滿船橋臨芳樹杪酒送白雲邉春老花將盡宵分客未眠故人同話舊潦倒醉青氊春晚同登惠山花落清明後扁舟載酒來山從一徑入寺繞萬松回池上泉聲細樽前暮色催杖頭錢未罄沽取盡餘杯春日宴宫詹吳公園亭湖上停蘭棹仙源此地逢徑幽羣樹合雨過百花濃池閣風鳴樹家山雲護峰笑談方竟日明發且從容夜發陽羡信宿名園裏揚舲出義興春寒頻對酒夜雨獨挑燈逺信時同鶴孤眠近類僧歸途風正好竟夕到毗陵丹陽與家兄弟舟中敘話江郭移孤棹時逢穀雨新鶯花三月暮燕麥萬家春野店沽村釀行厨薦渚蘋謝家兄與弟客路更相親雨後中庭夜坐槐庭秋雨霽正是納涼時雙闕銀河近千林玉露滋興隨清夜發坐為好風移此意無人解惟應達者知遊昌國寺古寺空山裏危樓積翠邊講堂凝法雨茶竈散炊煙樹引遊絲住風隨落絮顚僧家方午餉抱甕汲清泉晚登大茅峰西日斜懸句曲峰中天削出玉芙蓉雲歸絶頂迷春岫煙起深林翳晚鐘怪石巖前蹲虎豹長松澗底走虯龍臨髙遙向金陵望王氣千年正鬱蔥自茅峰回赴丹陽春山青不了回首望空迷落絮黏蛛網殘紅逐馬蹄人行香霧裏路轉畫橋西為阻連宵雨遊人半未齊贈孔曲山秀才稚圭髙臥曲山陽千載移文日月光燕雀未知鴻鵠志羽翰一任海天長毗陵别伊儀部同年北上春風一棹過毗陵握手匆匆别恨增我欲南還君北上夜深篷底獨挑燈上已日與客同登虎邱二首連朝伏枕因中酒此日登山更舉杯芳草已從香徑合殘花猶傍暮春開日臨山色當樓滿風度泉聲曲澗回自是邀遊興成癖扁舟湖上許重來劒池春色緑沾衣把酒登臨入翠微幾處歡呼追勝賞一畨歌舞竟斜暉鶯藏琪樹間關語燕逐楊花髙下飛上已風光時正好共君潦倒未須歸贈王儀部同年分巡東浙胥江春雨後送客剡溪遊帆向天邊落舟從樹杪浮越中新憲節吳下舊風流遙想山隂夜髙情屬子猷池亭月夜遲客不至漫興山公池上月澄霽似中秋深樹煙初歇晴空水欲流美人期不至華館自淹留獨酌仍多興狂吟倚蒯緱雨中登蠡東水閣雨洗園林潤風生水閣寒池荷初起蓋籬笋漸成竿曲檻臨花外髙忩隱樹端聞來此登眺頓覺眼前寬山中逢人道姓名因口占一絶春去猶乘雀舫行晚山罨畫半隂晴投間此地頻來往休訝山人識姓名蠡東别業青郊開别業緑水抱孤村旭日雞豚散芳春竹樹繁苔侵蔣詡徑雲護辟疆園鄰舍香醪熟還聞夜扣門舟中晚眺涼風天末起湖上送歸橈返照和煙暝殘虹帶雨消孤村時吠犬深樹已鳴蜩坐看東山月相將不待邀城歸喜雨晨出望齊門舟前水氣昏逺山雲似墨近郭雨傾盆雷電連空起蛟龍出海奔山農俱滿望忭舞遍郊原池亭雨後華館開林末新涼生雨餘荷香飄座逺山色逗忩虛避俗千竿竹消間滿架書連朝厭城市來此稱幽居夏日放舟過蠡東别業揚舲過蠡口言往習池遊竹徑紅塵逺柴門緑水流一樽時遣興竟日可消憂坐久涼風發林塘六月秋看童子種豆傍簷時藝豆插竹便成籬蔓引清風入花凝曉露滋先秋涼瑟瑟帶月影離離相對茅茨下幽居興在兹夏日書齋二絶香消日正長蟬鳴夢初醒睡起立空階梧桐落清影苦暑忘冠履消間對奕棋緑隂滿忩户正好納涼時池亭望雨不至江鄉千里旱處處桔槔聲樹底蟬鳴晚簷牙鵲噪晴疾風吹雨散落日照川明隴上農家子難禁悵望情蠡東書舍即事清溪抱村落深樹鎖煙霞客至開三徑間來共五車涼生蒼玉簟風落紫薇花向晚逍遙坐池臺月色賖江村雨後山雨朝來溼滿城郊原無復桔槔聲石牀雲過琴書潤水檻風生枕簟清林駐淡煙迷竹樹溪浮新緑繞柴荆蠡塘數里荷花發還擬扁舟弄晚晴早秋日書舍槐庭日正長梧院秋偏早風落紫薇花滿地無人掃早秋日遊王比部園亭摩詰城南第名園枕曲流竹林堪避暑梧院早知秋掃徑苔痕破開簾樹影浮蘭樽同笑語竟日此淹留穆宗登遐書感聞説君王棄萬幾孤臣千里淚沾衣鼎湖此日乘龍去蜀地何年化鳥歸曉兔空從金殿落秋螢時向玉階飛遙知弓劒橋山畔曙色蒼茫薤露微邀方司訓同往蠡東别業已下迎徐榻言遲訪戴舟孤村禾黍晚數里蓼花秋且莫歸青嶂還來看白鷗百年能有幾寧惜片時留秋日方司訓過訪二首雨過園林後新涼滿樹梢勞君攜杖履訪我扣衡茅水檻橫漁艇松門隱鶴巢故人同笑語塵網暫時拋地僻少來客居間時不冠孤亭浮水面喬木上雲端雨滴琴樽潤風清枕簟寒呼僮縶君馬信宿且盤桓早秋日與客遊虎邱古寺空山裏聊因避暑來路從松下入門向竹間開深樹蟬聲集層軒鳥道回相將孤月上樽酒許重陪仰蘇樓晚眺髙閣憑虛起重闌俯翠岑客來原有約雲出自無心黃葉凝秋思青松礙日隂北窗天欲雨涼氣坐來侵池亭晚霽江皋初雨霽涼思襲荷衣喬木生靈籟孤亭送落暉波翻菱葉亂露泫豆花肥苔徑間來合應知過客稀東樓晚眺散帙倚東樓川原一望收蟬鳴黃葉寺鳬下白蘋洲落日青山外西風古渡頭江鄉景堪愛禾黍萬家秋池上新構小齋誅茒營小構靣水敞晴軒俗駕時堪避清隂日正繁開簾看竹色涉徑破苔痕客有知音者頻過不厭煩晚泊松陵挂帆過笠澤艤棹問鱸魚古寺垂楊裏長橋荒蘚餘煙雲秋壑冷水月夜船虛釣雪灘邊路他年擬卜居嘉禾道中觀潮緣久約放棹復乘間片雨嘉禾外孤雲笠澤間捲簾看緑水把酒對青山雅性耽清賞扁舟未擬還崇德道中喜晴久雨初開霽天埀别樣青風生秋水練雲斂暮山屏疏栁官橋路寒花古驛亭遨遊此乘興相對酒俱醒舟中晚眺湖上西風錦纜開晴沙白石水縈回蓼花洲轉河橋曲落日漁舟蕩槳來八月十六日與客同遊西湖芒鞋同上泛湖船萬頃波光一鏡圓日映諸峰浮水面雲扶髙塔倚山巔幽花曲渚橫秋色疏栁長堤起暮煙準擬今宵明月夜與君潦倒不須眠謁和靖祠同上釣魚艇間登放鶴亭祠臨秋水碧湖帶逺峰青荒砌多苔蘚喬松長茯苓遐哉林處士千載仰儀刑江上觀潮昨泛湖中棹今登江上臺忽驚滄海內遙駕雪山來勢比行天馬聲疑奮地雷鯨翻渤澥動龍激禹門開汜濫江湖溢奔騰天地回黃雲凝未散白鳥駭飛回不是瞿塘峽虛浮灎澦堆難忘越人恨空抱伍胥哀弔古應多賦臨風愧不才謁嶽廟一首曾於青史想容儀此日登臨過古祠壯志未能忘北狩忠魂猶自倚南枝矢心天地圖恢復唾手燕雲在指麾千載英雄常涕淚金牌何事即班師秋日同王僉憲劉大參遊石屋洞天仙臺長松十里路盤旋石屋深藏古洞天林下諸僧間白日空中孤鶴下蒼煙青山社許陶彭澤丹竈砂逢葛稚川最愛曲江花裏伴一樽潦倒白雲邊遊飛來峰中天飛下青芙蓉峭壁巉巖千萬重仙境霞明金錯落洞天雲露玉玲瓏古藤亂繫將崩石老檜雙扶欲墮峰海上三山何處是恍然此地或相逢舟中寄貴州滕憲副同年憶昔同為選部郎可憐别後各參商一封書寄南飛雁萬里隨風到貴陽秋日過雲間謁少師徐公江鄉秋色滿東籬相國歸來鬢已絲試問華亭明月夜鶴聲誰似漏聲遲舟發雲間曉發雲間驛風生水國秋潮痕平兩岸帆影漾中流共泛杯中蟻間看水上鷗何時脫塵鞅蝦菜五湖舟舟中晚眺落日低沉閣殘霞倒浸江輕帆晴片片歸鳥暮雙雙酒興隨時發詩魔未肯降間心對流水獨立倚篷窗千墩曉發殘酒初醒後江天欲曙時雞聲催棹發月影逐帆移湖海牽遊興家園入夢思芙蓉花正好似與主人期崑山晚歸崑山猶在目挂席又唯亭湖外蘋花白霜前楓葉青檣烏隨落日水鳥下寒汀歸路天將暮柴門半未扃送蔣祠部出守髙涼南宫初出守萬里駕星軺報國丹心在辭親白髮饒髙涼日漸邇炎海瘴應消握手難為别知君懶折腰重陽日與客池亭小飲江鄉逢令節攜酒醉重陽楓葉經霜變芙蓉近水芳淡煙生竹塢宿雨暗池塘檢點年來事園林日正長秋夜書齋獨宿澤國秋將盡書齋夜欲分孤燈懸壁照落葉隔忩聞啼月烏栖樹隨風鴈入雲寒衾清不寐耿耿惜離羣雨中登蠡東水閣水閣初冬候間來時獨登雨中聞藥臼林末挂漁罾苔暈侵忩長茶煙傍竹凝臨風思無限寂寞曲闌憑雨後登樓晚眺雨洗塵氛盡風髙朔氣侵凝眸時逺眺抱膝更長吟浩蕩乾坤闊淹留嵗月深飄然生逖想千載達人心月夜同諸友小集二首空林懸片月良夜步清溪野渡煙初起寒原燒欲迷犬迎羣客吠鵲繞一枝棲對景偏多興蘭樽月下攜寂寞書齋靜柴門喜客過開樽還旅坐對月起髙歌樹影當階亂霜華拂袂多酒闌賓客散試問夜如何城中夜歸江郭寒鴉暝篷忩暮色催孤舟連夜發數里帶星回燈火沿村起柴扉逐水開草堂人未寢相對共銜杯晚泊震澤宴罷司空宅舟回笠澤濱霞明雞誤曉沙白鷺迷津蝦菜湖鄉味羊裘客路貧篷忩間立久月色正宜人曉發磧礇枕上口占殘酒初醒後寒燈欲滅時霜飛蓬户早月落戍樓遲未解聞雞舞徒興夢鹿思詩成還穩睡此意少人知蠡東書館寒夜有懷别業三冬後書齋五夜長風搖銀燭影火燼玉爐香古木烏棲月晴空雁唳霜寒衾人獨寤耿耿憶鵷行除夕二絶澤國今宵嵗欲除小齋無寐獨躊躇朝來天子新開歷還見春風到草廬抱戚江鄉六載餘燈前驚歎二毛初平生多少風雲氣竹帛勛名半已虛栁枝詞四首陌上絲絲帶雨微遙知春傍栁條歸一年一度常如此昔日章臺今已非裊裊柔條鎖翠煙隨風亂舞緑窗前楚王宫裏人多少如此腰肢亦可憐雨織金絲緑未敷隔窗偷眼看糢糊畫眉京兆今何處試問雙睂得似無河橋青眼競窺春淡著煙光别樣新留却長條休浪折春來多少逺行人早發南行口占澤國春寒花事遲行人臨發又愆期今朝放棹梁溪去處處東風颭酒旗舟中晨起破曉船爭發日髙人晏眠因酣吳市酒思煮惠山泉鳥去青雲外帆飛緑水前終朝困塵網到此獨悠然夜宿白土酒家日落半山隂倉忙過客心車徒投白下燈火近青林肆列春盤細杯添夜漏深兒童進新茗端可滌塵襟路傍折梅戲占肩輿屈曲傍山溪折得梅花手自攜蜂蝶也知春意在隨車直過畫橋西春日留都久脫朝簪伏草萊投間今上鳯凰臺馬前雙闕連雲起天外三山聳翠來好鳥偏從名苑集竒花多向上林開六朝舊事今何在欲踵風流愧不才途中寫懷柬董司空劉光祿二省丈潦倒江鄉數載餘姓名久不到公車幸承季布千金諾更得劉公一紙書長揖昔曽容汲黯倦遊今已老相如饒君肯假吹噓力淺薄那能賦子虛途中有懷靈殿寺梅花三絶野寺梅開千樹花風飄香雪點袈裟自憐清賞難消受偏到開時不在家古殿荒涼梅正繁春風花滿給孤園主人底事忘歸去誰遣清香撲酒樽二月江鄉已落梅飛花散作白雲堆且拚醉臥山忩下疏影還從月下來雨後登虎邱蘭舟維細栁與客共攀躋山靜花爭發林深鳥亂啼羣芳含宿雨雙屐怯春泥杯酒論心久危闌日己西春日過城南别業放棹城南日未斜雨餘百卉競春華迎風弱栁垂金縷近水夭桃漾錦霞魚藻輕翻浮别沼燕泥頻掠過東家生逢佳景須乘興莫遣香塵汙落花清明日舟次邀方司訓同往西山寒食江村路門多插栁條市呼新釀熟客喜宿酲消雨洗山光潤風生花氣饒故人原有約沙際一停橈宿西山古菴落日青山下停舟共訪僧雲低簷外塔香繞佛前燈野曠泉聲逺春和花氣蒸偶然逢二妙還許聽三乘朝發古菴雞報山忩曉時驚客夢殘蒲團迎日色羅袂怯春寒清磬和雲落繁英帶露看舟行更回首髙塔出林端登七十二峰閣夜宿顧山人家聞説桃源萬樹花遨遊端為惜春華煙霞深間仙人宅魚鳥偏鄰處士家湖面流光浮日去山圍斷處倚雲遮杖頭剩有青蚨在緑酒頻沽不用賖飲陸啓孫含青軒和方司訓韻地據湖山勝誅茅結小亭簷前芳草緑座上逺山青花月春遊倦茶煙午夢醒蟠螭來較晚香墜錦雲屏寒食飲楊氏宅佳節偏多雨荒村入禁煙鳥啼歌扇外花落舞筵前香霧侵衣薄微風入座偏主人能勸飲相對共陶然登虞山望湖亭湖霽浮銀鏡山圍列翠屏層臺臨拂水曲澗似蘭亭鶯語巖花媚龍歸洞草腥危闌羣勝集獨坐酒初醒蠡東前園即事二首春園門久閉入徑薜蘿封林駐茶煙細衣沾花露濃水邊雙白鶴檻外數青松對此幽間境頻過意未慵地僻塵氛逺池晴水竹分孤亭明夕照列樹暖春雲戲蝶懸蛛網遊魚避鴨羣晚來花下坐漸覺酒微醺澱山湖中曉起進蘭橈東行水國饒湖連天共逺日出霧全消獨鶴凌風舉羣鷗逐浪飄栁村看漸近青幔映河橋舟次唐行江鄉逢暮春一棹艤沙濱客路看飛絮行厨薦緑蘋冠裳時暫逺魚鳥漸相親長嘯乾坤裏悠然著此身曉發大寺鎮孤村雞報曙遊子動歸橈河帶明星落煙迎旭日消地卑多近水湖曲不通潮野店香醪熟侵晨向客招沙湖舟行昨送春歸去今從湖上來殘雲隨雨盡逺浪拍天回水鳥驚人沒汀花向客開間來心境寂無復著纎埃池館新晴園林新雨霽嫩緑壓枝繁戲蝶穿花舞遊魚出藻翻清香凝曲檻佳景落幽軒獨坐無人到惟聞鳥雀喧夏日園居寫懷園徑頻看趣自成蕭條終日掩柴荆池邊久立諳魚性樹底間行識鳥聲過雨林梢凝斷靄夕陽霞彩弄新晴且將疏懶荒村卧浮世誰憐阮步兵崑山晚歸漫興百里崑山道歸舟趁晚風霞明千嶂外日落五湖東未獲隨仙仗還堪學釣翁深源真可笑忽忽自書空夏日園居諸親友見訪幽居掩蓬戶端足避塵囂對酒顔仍破開軒興自饒風生香漸逺水近暑潛消故舊攜棋局林間不待邀晨起遣興山窗雨過動微涼對鏡俄驚鬢髮蒼堪歎浮生苦無幾漢庭空自老馮唐夏日過城南别業肩輿久不到城南此日投間一駐驂近水亭臺宜落景隔籬花竹映澄潭忩間逺岫來空翠雨後長天正鬱藍便欲攜家同此隱爐香茗碗事幽探東宅漫興宅傍青郊曲盤旋竹樹幽石梁空待月池館更宜秋雲拂階前樹風清水上樓間來時嘯傲坐覺暑潛收送馬憲副同年之楚昔日看花曽作伴今晨把袂若為情欲知此後相思處黃鶴樓前片月明送錢秀才兄弟應試吳越神明胄相看盡白睂共乘木蘭舫期折桂花枝鄉國凝眸處都門燕喜時君家兄與弟靜聽鹿鳴詩登上方寺路入楞伽寺明湖映逺峰兩崖松檜合一徑薜蘿封亭逼青霄近林藏緑蔭濃開樽共吟眺煙樹暮重重行春橋玩月臨湖維短棹天末起涼風皓月飛銀鏡長橋偃玉虹望中煙翳景席畔水涵空勝會知難再酣歌意未窮新秋夜坐小庭賔客散獨坐更移時西嶺雲生巧東林月上遲蛩聲鳴亂草螢火照疏籬虛館清秋夜幽懷只自知蠡東晚歸舊宅薄暮客西歸舟行載夕暉亂蟬悲露切宿鳥渡煙微秋水逾明鏡殘霞似畫衣停橈天漸暝一犬護柴扉晚發華亭向晚蘭舟發人牽錦纜行日穿雲竇破溪接海潮平映水帆檣影投林鳥雀聲開簾下階拜遙想故人情舟次嘉善縣漫興二首江郭憐孤往西風灑客裳雨晴林葉潤日暖稻花香白髮催年邁滄洲引興長鱸魚秋正好歸思不能忘返棹孤城下輕雲近女牆槿紅初過雨橘緑未經霜景物看來變浮生祇自忙馮唐真易老白首尚為郎夜泊嘉興城同年戚符卿過訪訪舊嘉禾郡城頭暮色催水邊孤艇泊燈下故人來惠我多新句酬君愧不才何時重放棹同上越王臺吳江道中二首雨後松陵道西風吹布袍帆飛秋水濶雁度暮雲髙野店乞殘火行厨進濁醪微吟殘照裏獨坐檢離騷揚舲過笠澤回望是姑蘇驛路分南北煙帆半有無孤城臨巨浸平野插浮圖今夜長橋月清光映玉壺中秋晚過虎邱蘭舟初雨霽正值暮鐘時酒為藏􅍐醉棋堪應劫遲煙迷蘭若寺露冷桂花枝月出雲還翳空辜石上期早發冶場涇客路宵分後茫茫煙景迷孤舟行載月數里未聞雞白露侵帆溼明河向水低棹歌驚夢斷已到蠡塘西遊桂嶺西嶺千年桂隂森入翠微瓊枝雲外緑金粟雨中肥影落浮杯酒香飄襲客衣當年和露折曽向廣寒歸贈碧峰上人古剎深山裏幽棲獨旻公三乘聞己悟五藴本來空止水禪心似孤峰色相同蒲團深嵗月龕外雨花紅遊天池穿雲躋碧嶺遙望近丹邱雨歇金蓮霽煙涵石屋秋樓臺開絶境花竹映清流紅葉蒼山暮停車為爾留出山昨朝逺赴野人期短棹琴樽帶雨移山閣煙霞秋霽後法堂燈火夜深時竹間共喜髙僧話石上慚無幼婦詞桂嶺天池耽勝賞舟人休訝出山遲竹梧書院晨起日髙三丈遲遲起闌干曲曲人頻倚秋風落葉滿庭除呼童掃葉收梧子贈伊母太淑人堂上萱花嵗月長階前蘭玉競芬芳南宮仙吏稱觴後雙袖猶沾粉署香送近岡吳太守入覲二絶天皇出御未央宮萬國衣冠入覲同借問循良誰第一漢庭無復過吳公滿路吳民起頌聲願言借冦向承明春風三月棠隂下多少兒童竹馬迎送長洲陳明府入覲朔風吹袂冷鞍馬去京師天外雙鳬逺雲中一鶴隨賦先羣邑起績報九重知花縣歸宜早徴書漸及期夜泊嚴墓鎮燈下聞歌客路黃昏後移舟近釣磯夜長頻剪燭露冷欲添衣桑落浮杯緑車螯入饌肥醉餘聞妙曲響遏白雲飛吳江道中言返嘉禾棹時過釣雪灘平湖環縣霽髙塔入雲寒沙岸蘆花白霜林楓葉丹開簾看旅雁點點落江干村晚細雨孤村暮呼僮扃竹扉牀頭新釀熟座上故人稀野寺昏鐘起煙林宿鳥歸有懷清耿耿簷外片雲飛冬日與客遊西山孟冬風日暖與客共登山一嶺界天上諸峰隱樹間茶花隨地白霜葉滿林斑回首天將暮僧從落照還舟發婁門夜抵崑山揚舲過湖曲沽酒近唯亭婁水浮煙白崑山擁縣青亂鴉棲暝樹飛鳥下寒汀夜傍漁舟宿時聞蝦菜腥送陸春元北上閶闔風生白雁髙征人寒擁赤霜袍羡君北上陳三䇿愧我南來漸二毛剪燭夜傾桑落酒揚帆時度廣陵濤看花上苑春將近不惜臨行贈佩刀金閶送别晚歸金閶時送别落日照清樽山近雲常繞天寒水易昏雁迷千嶂雨犬吠數家村歸路休言晚嚴城未掩門胥江送陳明府入覲兼寄申王韓三內翰二首送客胥江别微茫煙景分舟前見新月天際斂輕雲夙有林泉興慚無竹帛勳封書寄朝貴應念久離羣數載江鄉卧曽無政府書未須嗟失馬久已願焚魚嘯傲乾坤闊優遊嵗月徂故人俱侍從肯憶病相如蔣雲涯太守自髙涼入覲因歸省吳中賦此為贈嶺外風塵暗百蠻今朝喜得故人還畏途潦倒心猶壯炎海驅馳鬢欲斑嵗晏衝寒朝魏闕夜深飛夢繞吳山歸期屈指春將暮三徑花開白日間城中夜歸日落歸心促天髙朔氣凝月明寒渡水煙白夜船燈疏懶真堪棄脂韋素未能拙哉蕭狷叟垂老乞為僧晨起得起官報懶性甘終棄除書忽漫傳陽烏分樹杪晨鵲噪簷前地忝銓衡重心慚水鏡懸皇恩真浩蕩舒眼望青天晚過天平嶺數里天平嶺﨑嶇石路遙孤雲倚絶壁萬笏擁層霄嵐闊衣偏薄寒欺酒易消肩輿歸漸晚落日在林梢早發青浦五夜溪塘風雨聲水村雞唱漸天明數杯濁酒醉初醒一枕黃梁夢未成篷底捲簾看日出沙邊解纜趁潮平揚帆逺向雲間去極目煙江無限情鯤溟詩集卷二
