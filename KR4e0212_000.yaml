body:
  text: 鯤溟詩集别集類五明提要臣等謹案鯤溟詩集四巻明郭諫臣撰諫臣字子忠長洲人嘉靖壬戌進士官至江西㕘政初為袁州推官時憤嚴氏亂政乃宻籍嚴世蕃奸逆不道事因御史林潤上之世蕃遂伏法及轉吏部主事遷員外郎數上書論列時事語多切直又與張居正忤乃有江西之命甫三月即自劾歸其生平抗直不愧其名與字而其詩乃婉約閒雅有范成大陸游之遺雖十首以外不免語意畧同如髙仲武之論劉長卿者然當太倉厯城主持壇坫之時能毅然不隨風氣而轉亦足見其孤介矣是集為其子元望所編凡詩六百七十一首又附奏疏二篇集中無與王世貞唱和詩故世貞作序謂交久而㡬失之復稱其詞咸調暢清麗句穏而字安不露蹊徑而近體尤渢渢可詠葢亦重其為人不以門户之異為嫌也世貞謂其詩可千餘首此集不知誰所刋定其亦出世貞之手歟初刻于萬厯中此本為其五世孫鸞重刋而陳鵬年為校定云乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:a110dadb48f5abfacb9ccfa0aa7972c93c2523b25b0f5558f80a117f865dcd32
