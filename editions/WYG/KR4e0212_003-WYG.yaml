霞江上聞乞歸命下口占三絶投劾清時效二疏綸音忽已下公車書生未帶封侯相且向春風卧草廬江上風濤險殺人便應從陸走江濵自今已得安身䇿豈向天涯復問津征車馳逐苦勞勞日晩風生舊緼袍指㸃前途隨處宿不須重覓吕䖍刀山行過仙槎寺梵閣層霄構仙槎古寺名松間羣從入石上一僧迎映日孤雲細窺春好鳥鳴喜無羈靮累瀟洒不勝情宿江上人家落日催征騎扁舟下渡江軒輿停舍館燈火照山窗懶性真堪隠雄心未肯降良宵清不寐入枕水淙淙烏兜公館孤村屈曲四山圍華構新成落翠微髙棟曉迎紅日起晴窗時送白雲飛三春花滿郵亭暗五嶺天髙使節稀此地頻過遊已倦相將重整舊荷衣䖍城與同年徐憲副敘别口占五絶把袂江亭歲欲徂春風依舊長䕷蕪楚天漠漠人南北君向秦中我向呉惜别看花並馬遊天涯此日共淹留萍蹤倐忽隨流轉碌碌風塵易白頭話别江亭日欲晡片帆風送下姑蘇他年訪我衡門下松竹蕭然一老夫杯酒淋漓話轉濃嶺雲籠樹暮重重淸時投劾非髙尚直道從來世不容渭樹江雲此地分且捐武事共論文關西理學今誰主屈指儒林已到君再别徐魯源兵憲周大川僉憲郭兩峰叅戎一首郵亭花發袂初分靑眼相看忍别君嶺樹啼猿聽下淚楚天歸鴈惜離羣春江水長連朝雨落日風生萬壑雲此去聊堪同隠豹南山朝霧正氤氲自贑抵萬安舟中遣興一棹春江上東歸似季鷹自憐同白璧忽爾避靑蠅非是嫌官縛多應免盜憎海天鴻獨舉萬里任騫騰漳江門與王孫既白敘别漳江門外栁條靑别酒淋漓愧獨醒千里風波淹宦海一帆煙雨暗郵亭匡廬西望天將暝笠澤東歸鬢欲星知向王孫分袂後清􅆐吟斷翠微屏餘干道中千里東歸客孤帆細雨舟樹垂平楚逺水接大荒流冠盖臨鮫室家山憶虎邱人生百年内天地一蜉蝣安仁道中漫述雨後春風拂面和江涵晴日弄微波一帆煙景侵衣薄兩岸山光入棹多行篋怕添新薏苡故園仍長舊藤蘿十年宦海真成夢好把宫袍換芰荷貴溪道中一竿斜日映簾低百丈遥牽入貴溪社日忽驚𤣥鳥至春風時聽鷓鴣啼墟煙渺渺天將暮江草萋萋路欲迷越水呉山行漸近芒鞵到處可攀躋晩過弋陽雀舫東歸過弋陽迢迢千里水雲鄉江明倒浸孤峰影風暖遥聞百草香飛鳥晩來同客倦閒花時亦笑人忙呉門到日春光好煙栁低垂緑野堂東歸過上饒柬别沈三洲少叅江上春風一棹歸從君乞取舊荷衣春來花底隨麋鹿雨後山中採蕨薇題鳳有人過竹塢焚魚終日掩荆扉白雲滿屋心常寂不管人間是與非曉從廣信過玉山途中作時屬豔陽景誰無遊冶情况乗雕轂去逺作玉山行日氣蒸花暖煙光翳竹輕乾坤容我老荷芰製初成夜泊富陽富陽城下泊落日映川原雲起連天目潮生自海門客星春渚白仙舫夜濤喧嘉遯思前哲終期不負言夜泊嘉興北門解官千里至新月一鈎懸秉燭靑樽畔停舟緑水前春來遊子倦老去故人憐客路煙花滿狂心逐少年鯤溟詩集巻三
