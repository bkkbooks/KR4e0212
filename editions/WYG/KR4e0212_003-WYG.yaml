body:
  text: 鯤溟詩集巻三明郭諫臣撰元旦聖節口占二絶五更膏沐去朝天萬厯今朝又一年江海孤臣時捧檄寸心常在聖人前晨夕嚴裝上帝都聊從逺地效嵩呼方今天子真明聖夏啟周成得似無新正二日與客虎邱敘别山樓與客進椒漿鐘磬時聞到下方城雪尚留殘臈意江梅微露早春光宦情本似浮雲薄别意空隨逝水長回首自憐歌舞地煙花三月在他鄉春夜洛社舟中敘别一篙春水暖浮煙洛社溪頭夜泊船對客欲烹陽羨茗呼童汲取惠山泉燈前髙㑹逢新歲醉後狂歌逐少年他日相思何處是呉山囘首白雲邊途中寄别方司訓幾年同結靑山社此日還乗畫舫行愧我風塵緣薄宦憐君煙月倍多情雲中孤鶴嗟何逺海上閒鷗自不驚髙蹈如公真足羨深源出豈為蒼生夜宿儀真公館風色晩來定濤聲聽漸平大江當縣繞片月近人明栢府寒烏集松堦夜鶴鳴沉吟燈下坐多少别離情途中憶諸兒孫客路迢遥憶鳳雛草堂羣聚日歡呼一時尚未離慈母他日期當作丈夫世說神駒堪上廏誰憐老驥倦長途幾囘月落關山夜恍惚神游在五湖過滁陽陸五臺李漸菴許敬菴三丈招飲公館賦别二絶滁上相逢盡故人張燈開宴意何親欲知别後相思處豐樂亭前月一輪衆山環列翠微屏故舊相看眼竝靑明月滿堦賔客散令人空憶醉翁亭元夕宿池河驛馬上逢元夕令人憶故園月中絃管沸燈下綺羅繁火樹當空列人煙徹夜喧客途今寂寞獨坐向黄昏臨淮北渡馳驅江路逺此日渡淮河睥睨低紅日旌旗漾碧波春光看柳變煙景翳帆過身係浮名去歸期奈若何宿州道中遇風有感向晩風猶急長途日易昏征人尋宿處馳馬望前邨過隴牛羊下歸林鳥雀喧宦游此風景勞役共誰言彭城懷古江淮北上古徐州城下黄河日夕流煙火萬家連兖豫舳艫千里向燕幽春風草長王孫路夜月塵迷燕子樓驛畔孤墳碑廢乆行人指㸃說留侯行次河間路聞外補馳逐風塵際悠悠祗自憐除官當歲晩為客在春先去國縁多口還朝知幾年淮陽稱卧治不敢擬前賢過白溝河囘首鄉關去路遥白溝河上度星軺滄洲日落迷煙草紫陌春歸在柳條身外浮名何足羨鬢邊華髮不曽饒自憐瘦骨仍多病奔走風塵肉暗消暮抵雄縣鼓樂喧闐震耳鳴逺勞車馬出郊迎平沙隄上留行轍弱柳風前拂去旌添我腰黄誠異數悞人頭白是虚名從今勘破人間事好向湖山續舊盟過琉璃河平沙一望接京師獨上河梁折柳枝日煖冰消春水漲分明千頃碧琉璃都門外報國寺夜坐書感徴書歲晩下江鄉走馬來瞻日月光咫尺君門天萬里燈前寂寞夜偏長登報國寺毘盧閣毘盧髙閣倚層雲仗劒閒登日未曛萬頃煙霞天外落九重城闕望中分雪晴山色當牕見風動鈴聲下界聞徙倚闌干時縱目皇都佳氣正氤氲廣庭歩月有感春月流輝浸碧松廣庭閒歩自從容幾年湖海來京國此夜空聞長樂鐘都門與王比部馬憲副申内翰三同年敘别二首昔日看花伴今晨喜盍簪宦游來薊北送别過城南紫陌春融雪靑山曉䕶嵐情深頻進酒非是愛沉酣歸卧江鄉乆時從檄召來分藩到庾嶺䇿馬去燕臺聖主原無意微臣自不才孑然湖海客知向幾時囘涇陽驛口占幾日馳驅未出燕風沙滿眼路難前孤蹤遥向天南去囘首長安在日邊趙州懷古長楊夾道引鳴騶夜宿燕南古趙州草滿叢臺非舊日月明泜水只空流也知此處荆蓁地多是當年歌舞樓陵谷變遷人不在關河煙鎖古今愁柏鄉遇銓司舊吏時為縣尉賦此客途逢故吏知我舊銓郎作尉同梅福之官在柏鄉嚴城勤斥候傳舍盛供張更向虞君問云何去廟堂柏鄉懷古路出柏人邑令人憶貫髙捐生蹈虎尾視死若鴻毛漢主那堪迫商山自可逃區區圖雪恥寧惜趙王敖晩過内邱晩過内邱縣東風輕拂衣雲旌去縹緲煙景漸霏微故里花將發他鄉客未歸兼程日南往中夜夢魂飛夜宿順德公館侵晨厯趙境薄暮宿邢臺秉燭當軒坐鈎簾待月來靑衫春漸薄緑酒夜須開佳景方留戀城頭鼓又催沙河縣邢臺南望路迂斜一縣周圍盡白沙日映郊原鋪玉雪風生林木綴瓊花霜前蚤起應迷鷺月下歸來止辨鴉試問當年檀道濟唱籌量得幾多車邯鄲早發抵車騎關漫興行次車騎關猶是邯鄲道雞鳴夜已闌馬嘶天漸曉旌斾風飄飄川原日杲杲行看煖氣囘轉覺春光好新柳緑堪憐亂山靑不了天畔送歸鴻陌上聞啼鳥游子未歸家故里生芳草因想宦游人馳驅空易老渡漳河有感輕浮一葦渡漳河時聽舟人起櫂歌山自太行西望逺路從全趙北來多春深諸塜埋靑草歲乆三臺浸碧波日暮停車倍惆悵英雄千載類消磨淇縣淇水湯湯日向東居民似有上皇風始知世變風移乆浪說桑間與上宫經牧野弔比干墓牧野荒荒落日低愁雲深鎖比干祠寧將血濺商家土忍見頭懸太白旗麥秀春郊麋鹿走花殘夜月杜䳌悲古來忠直多磨滅千載令人淚滿頤延津道中五更辭衛郡百里過延津馬踏晴沙日鶯啼紫陌春軟風隨弱柳細雨浥輕塵漸向東南去韶光别様新封邱道中昨擬走大梁覽勝古汴京晨起延津境忽作封邱行山川本相似途路近且平逺馳燕趙騎復捲魏衛旌曉行趁殘月暮宿視長庚客途少休息傳舍多送迎思之良厚顔不如且歸耕所以晨夕内勞勞苦東征東征倦行役對鏡徒自驚渡黃河遇風河上東風吹客袍中流濁浪拍天髙平生不識風波態今日方知渉險勞杞縣懷古杞邑名何始分封自有周報功宜百代置縣已千秋草長多新壘花開滿故邱方今病河患誰宅此神州寗陽公館雨夜獨坐髙館張燈坐悽然思不禁春風隨客逺夜雨滴更深漫說金横帶還愁雪滿簪流光看易過對酒獨沉吟夜宿㑹亭公館古驛當周道環居多樹林一番春雨後千里使星臨苔暈侵堦長花香入院深燈前看緑綺何處覔知音夏邑道中早行東郊旭日遲遲起好鳥枝頭啼不已三杯濁酒漸微醺頃刻前行數十里鞍馬晨衝楊柳煙旌旗夜溼棃花雨風光到處自堪憐隨時歡賞人能幾永城太邱驛人傑從來使地靈永城猶借太邱名當時黨禍人皆死豈謂君因獨弔生固鎮道中雨後淮南路山原入翠微春風花漸發社日燕初飛曲水迴官騎香泥染客衣江鄉寒食節早晩望東歸王莊驛遇同年劉憲副看花昔日曽為伴南北東西各一天萍水相逢疑是夢金蘭契合已多年郵亭晝掩棃花雨客路寒迷楊柳煙聞說鄰家春釀熟一尊聊共醉燈前囘過滁陽重别太僕三省丈春來為客走燕關厯盡千山與萬山燈月滿城時北上煙花三月又東還眼前好景真成幻身外浮名總是閒别去五湖堪浪迹一帆春雨下荆蠻上已早行見霜上已今朝是清霜昨夜飛色侵千户曉寒損百花肥虚布青皇令翻成白帝威早行前路客引領望朝暉上已日過大柳驛積雨初收列嶂靑花開疑入錦雲屏風前舞燕迎人語陌上鶯聲喚客醒乗傳兩畨經柳驛流觴千載憶蘭亭韶華滿眼辜清賞空逐征車作使星上已日南過滁陽南去滁陽日未西四山環聳碧天低溪浮荇帶牽魚尾風落榆錢襯馬蹄社後已看𤣥鳥至春深時聽杜䳌啼鄉關囘首多芳草漫把王孫歸路迷夜宿六合縣僧寺鳴騶入古寺借榻近髙僧欲聽三乗法因傳五夜燈茶煙浮竹暗花雨向堦凝猶自牽塵鞅皈依惜未能寒食後一日途中口占一春潦倒客天涯幾度芳辰不在家寂寞江都寒食後東風吹老故園花清明日江上遇雨濛濛煙雨細如絲冷拂襜帷溼不知寂寞途中忘令節淹留江上數歸期酒從茅店分榆火人向柴門揷柳枝猶記去年當此日桃花萬樹醉蟠螭儀真寄同年潘明府聞君作宰臨光澤花發公庭映賜袍燕闕北瞻紅日近越鄉南去白雲髙江天鴻鴈違千里宦海風塵欲二毛憶昔同遊今數載相思中夜夢魂勞舟中喜晴夜向篷牕聽雨眠朝來時喜乍晴天風生野店靑帘颺露浥沙隄錦纜牽花氣氤氲蒸曉日栁絲婹嬝弄輕煙鄉關自恨歸來晩狼藉春光在客邊春日過同年伊祠部日暖江城雨乍收花開三徑為停騶文園君自猶多病宦海予今已倦遊世事看來同失馬機心忘却不驚鷗相逢鮑叔應憐我奔走風塵欲白頭晩春歸蠡西舊宅獻歲辭家春暮歸故園花已過芳菲雨餘細草侵苔徑風颺遊絲惹薜衣漫說鶯遷喬木囀還看燕向舊巢飛他年謝却人間事十尺長竿一釣磯暮春日有懷覺海玘公虎邱義公一首獻歲客天涯春深始到家東風吹玉版夜雨長金芽乆與髙僧别翻嫌去路賖遥思禪定後池月浸袈裟三月三十日登虎邱攜酒登山閣危闌日欲斜汲泉臨石澗試茗到僧家無意聞啼鳥傷心問落花來朝春已去空自惜年華新夏日訪錢文學兄弟一舸漕湖上投閒訪故知入門清晝永到處緑隂隨已負鶯花約還尋雞黍期東南稱具美欲去更栖遲贈方司訓子静次許太僕韻學道同商皓談經擬漢儒予慚葭倚玉君喜浦還珠春水從鷗逺閒雲伴鶴孤扁舟五湖上塵思似應無將往贑南治行二首乆向呉中卧時將嶺北遊一官聊染指五月尚披裘座上拈桑落燈前理蒯緱行期尋復改端為故人留懶性真堪棄虚名復見推且當從吏隠未敢卜歸期逺道少音信深閨恨别離傷心對桃葉垂老客天涯仲夏與客泛石湖白舫湖中飲靑山座上看日光浮浪出湖色入簾寒逺市煙初起深林雨未乾故人同勝賞潦倒厭微官夏日過村居即事不到家園乆柴門碧草生鳥驚行葢起犬向主人迎入院茶初熟開樽酒復清幽軒日正永花外有啼鶯夏日舟次平望與諸故舊敘别呉中一卧幾經秋此日重為嶺北遊澤國風生帆正逺楚天虹見雨初收强將懶性移靑雀漫把閒心對白鷗好趁晩凉維緑栁故人燈下共淹留錢塘江上起行前渡桐江水江清異汨羅北來呉地盡南去越山多逺市靑帘出危檣白鳥過薄遊何日返散髮傲煙波夏日過武林同年滕學憲邀遊湖上賦别薰風一葦繫長堤歌舞初停日已西十里荷香侵座逺六橋栁色帶煙迷虚名世上同蝸角浪迹天涯信馬蹄且喜故人相對飲松林蘭若更攀躋桐廬道中揚舲江上喜初晴兩岸山光夾鏡明到處水流寒澗出揷天峰吐白雲生逺洲浴鷺衝潮起深樹新蟬吸露鳴前向嚴陵臺下過髙風千古不勝情雨中上嚴灘山雨勢傾盆江流萬馬奔隂霾迷日月濁浪簸乾坤舟楫上還下煙林吐復吞宦遊瀕絶險空爾暗消魂蘭溪道中山雨朝來歇江流午漸平帆從天際落人在鏡中行孤鳥入雲沒羣峰接漢清扁舟時晏坐何處棹歌聲月夜江行夜色侵窗曙灘聲入座喧遡流臨皓魄乗興倒芳樽山斂微雲盡天從逺水吞滿懷風月思難與俗人言衢州道中侵晨鼓棹發三衢南去常山百里餘坐引清風生枕簟閒消白日在圖書山橋斾颺催沽酒蘋渚舟來喚買魚漫說宦遊多勝賞倦遊今已類相如自常山抵玉山途中作亂山靑四合江浙路中分草露沾香徑松風掃白雲遥趨南贑檄深愧北山文士女道旁立相看舊使君山中晩眺有感一路斜陽裏靑山引客車幽花生澗曲修竹繞邨居天晩鳥飛倦途窮馬力徐宦遊味如此何日遂焚魚早發進賢過羅溪湖上山城侵曉發花露溼星軺日浴湖中水虹飛堤上橋柳塘風漸起荻渚霧全消傳食真堪愧何能答聖朝宗室以詩見贈次韻奉酬清朝水鏡愧虚名握節重為嶺北行嬾性怕題鸚鵡賦畏途時聽鷓鴣聲十年予老淹呉㑹八斗君才冠鄴城何日還期開蔣徑花前倒屣一相迎峽江舟中晩坐二首晩凉時喚酒雨黒似催詩澄水映肌骨微風洒鬢絲髙吟蓮葉舫頻進桂花巵醉向篷牕立斜敧白接䍦午向金川過宵從玉峽來沙邊雙艇泊燈下一樽開劒氣凌南斗薇垣逼上台遐方時戀闕飛夢到燕臺江上聞笛江上浮仙棹誰將玉笛吹時聞折栁曲更聽落梅詞響遏行雲散聲隨斷角悲關山今夜月應起故園思舟過白沙驛向晩