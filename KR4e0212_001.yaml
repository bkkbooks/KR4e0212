body:
  text: 鯤溟詩集卷一明郭諫臣撰春日遊天池山和天水胡公韻天半孤峰削出竒蓮花倒影入天池晴雲暖護池邉竹芳草春深石上碑霞彩蕩空山欲動松隂滿地日初移仙源坐久渾忘倦莫怪遊人歸去遲長蕩舟行蘆葦煙消兩岸青湖光浩蕩水雲平晴波逺弄青山色緑栁新添黃鳥聲濁酒貰來緣有約殘英落盡自無情西山此去偏多興薇蕨離離繞澗生送從兄宗義戍龍里萬水千山行路難落花啼鳥靜中看長途有客頻回首故國無人獨倚闌荒戍城邉騏驥老夕陽江上鶺鴒寒白雲南去蠻鄉近笑倚吳鈎天地寬仲夏寄覺海玘公不見旻公久時時憶草堂修篁環徑密幽草遍山長絶壁雲疑墮奔流水自忙依依舊遊處相約在重陽英氣歌男兒挺生天地間英雄激烈如邱山養育成就在磨礪間關百折胡厚顔巾幗之遺不足恥緑林之輩不足死會須一忍在萬全方是英雄好男子君不見應侯昔為魏相客青蠅白壁遭讒賊拉脅折齒佯死餘使車猥載來秦國立談勇略萬乘傾相權赫赫諸侯驚仇人亡命終授首故人聊惜綈袍情又不見王孫昔日未遇時淮隂年少爭相欺俯首俯伏出胯下一市嗤笑無能為誰知事漢擒楚猴油幢虎帳臨淮流百辱仍將中尉報一飯豈惜千金酬丈夫落落心千古悻悻小輩何足數乃知能屈始能伸古來如此非獨我春日山房有客過訪因留宿别芳林日出翠煙消無限春心寄栁條紅雨池塘遊蝶醉緑隂庭院語鶯嬌半忩殘月論文夜一枕微醺中酒朝感爾相過又相别青青酒斾映河橋春日睡起杏花庭院晝遲遲睡起初驚燕語時遍倚曲闌無限思遊絲間駐海棠枝雨中新栁弱栁絲絲帶雨垂隔忩淡掃素娥眉等間莫向河橋折一縷常懸萬里思想山中新茶酒渴時思茗一杯玉川風味許相陪金芽欲吐無消息驚破江南昨夜雷山忩雨夜話舊不到西山久空門閉緑苔喜從燈下語疑是夢中來舊雨三年别新詩五夜裁老僧新釀熟對客一尊開春日訪友雪阻不果故人連卧病久不共髙歌欲訪寒梅信其如雨雪何蹇驢無處覓短棹數能過試檢吟囊裏新詩積幾多春日與客同飲江亭春風攜客上江亭萬頃波光洗眼明雲樹遙從天外落風帆如在鏡中行夜深不厭頻催句興到還應數舉觥指點蓬瀛那可見掀髯長嘯大江橫飛絮詞楊花如雪舞晴空飄泊隨風恰似儂願化浮萍逐流水與君千里或相逢天街步月口占天街露冷思難禁對月空懸萬里心故國此時方搗練滿庭梧影夜深沉睡起客舍蕭條日正長緑忩夢破黃鸝語分明身在故鄉遊枕上思親淚如雨自儀真舟行大江水拍春空一鏡明畫船風捲片帆輕金山雲護江心寺鐵甕天低京口城兩岸樹搖煙浪濶中流日照海潮平晚來忽聽傳呼語知有江南津吏迎夜抵九江譙鼓已三更孤舟載月明風霜千里客星漢九江城水淨飛帆影天空落鴈聲暗思髙卧者潦倒夢初驚早春日新喻道中雨洗川原一望新宦逰風物易傷神間花似笑忙歸客新燕還尋舊主人逺樹妝成天外景飛花流出洞中春滿懷佳况應難遣典却春衣莫論貧山中聞子規草深山徑馬行遲兩岸豐林叫子規行客驟聞心獨慘無端忽起故園思永新道中亂山髙下幾重重歷遍巉巖出險中平地起雲疑是嶂夕陽射雨漸成虹飛泉百道奔寒澗髙塔千尋插逺空堪歎薄遊無定迹馬蹄終日自西東送别故友歸吳中童稚論交三十年君今落魄困儒冠薄遊空慕林宗義逆旅誰知范叔寒江濶孤舟行樹杪天空一雁落雲端相逢不久又相别今夜月明何處看正月十一途中念家君初度偶成宦遊終日馬蹄忙偶見梅花憶故鄉春酒熟時歸未得一樽誰與進髙堂舟中曉起兩岸桃花夾水流一樽時醉木蘭舟多情最是三春夢夜夜遙從故國遊新月新月如弓曲未平清光照我入孤城當空桂影渾疑見繞路松隂解送行三五漸從今夜滿尋常還是故鄉明無端忽被微雲掩誰識嫦娥一片情瑞州公館月夜有懷栁梢新月照孤城花氣薰人入夜清遙想閨中春寂寞有人對月漫含情登廬山凌虛閣髙閣玲瓏倚太虛恍然身若在蓬壺開忩夜欲捫牛斗俯檻時看走兔烏林外天花凝寶樹簷前仙靄擁香爐憑髙極目秋天逺漢水湘山半有無九日江州諸公相約登髙不果木落天髙秋氣清黃花開滿九江城無緣得遂登髙興空負江州刺史情樂平道中秋晚山行林末見殘曛暝色催人漸不分幾點亂鴉歸暮堞一行征鴈叫秋雲煙髙野燒連空起風急樵歌隔隴聞終日馳驅車馬道薄遊多愧北山文自樂平過德興縣道經梅巖洞停輿入遊內有龍耳臥龜石鹿石燕仙田覆船諸物因賦二律山行逢野叟引我入仙源龍耳浮雲氣龜文雜蘚痕闢來多嵗月别置一乾坤去後重回首煙霞鎖洞門紆曲空山道深藏古洞天鶴巢千嵗樹龍滴四時泉無復燒丹竈空餘種玉田挂冠來此隱儘可學延年鄱湖舟中玩月千里鄱湖一棹過氷輪倒影湧金波客中對景生佳况醉後臨流發浩歌坐愛清輝浮玉宇遙看素練引銀河廣寒夜靜無人到辜負嬋娟奈爾何春日分宜縣喜遇楊少府南歸去值潯陽月歸當秀水春相看今日面猶是隔年人髙閣聊同眺清尊不厭頻别離情萬種驚見二毛新七夕舟次楊村燕闕天髙暮雨收青錢沽酒醉蘭舟蓼花曲岸回殘照禾黍西風動早秋三載空成南國夢一官還向上林遊遙思今夜吳門月幾處穿針閲女牛九日同省中諸友遊天壇道院雨餘秋色滿金臺九日聊因選勝來紫陌馬行苔徑滑仙源犬吠竹門開登髙幾負茱萸約對客頻傾竹葉杯既醉回瞻天闕近九重佳氣鬱三台天街月夜天街月色似中秋水接長空上下浮遙憶故園那可見一聲寒雁過南樓雨後自都門赴昌平途中覽勝漫賦秋郊晨出雨初晴馬首燕山入漢清紫塞北臨千里磧玉河南繞九重城漢家陵寢風雲護昭代山河日月明晚向昌平一回首騰騰王氣擁神京晚發昌平望京師祀罷諸陵逐曉回遙瞻旭日照金臺香輪旋輾平沙軟仙斾晴披宿霧開秋色先從邉塞老山光還繞帝城來一官願效山公啓三賦慚非杜甫才省中秋晚即事斜日薄西山幽齋夢初醒忩虛隙照明室靜爐煙冷老圃帶秋容疏林淹暮景省中出每遲松落空階影送辛黃二民部同年奉使江浙監兊朝罷金門夜已闌行行使節向江干身離禁苑香初散手捧天書墨未乾明月孤舟人並往福星一路衆爭看東南民力君知否好為蒼生著意寬早春日朝賀穆宗即位王氣絪緼照紫薇明堂重見漢官儀雲移仙仗趨丹陛風送爐香下玉墀日色旋臨鳷鵲觀春光先到鳯凰池太平天子開新歷應遣皇華四牡馳春晚省中書感簡許司封同年東風撲面動微和春服初成試越羅城背暖消殘雪盡林梢晴帶夕陽多眼前物態看來變鏡裏光隂老去何肯謝榮名似君少扁舟湖上傲煙波與銓省諸公觀潄玉泉流觴酣飲四山環列翠雲屏坐對清泉醉欲醒詩就香山追洛社觴飛曲水續蘭亭仙源晝永花逾白輦路春深草自青盛世風光莫虛度間中華髮漸星星觀永陵工作新作陵園枕薊門衆山來勢自崑崙也知月窟羣龍偃驚見天衢萬馬奔王氣騰霄微復見峰嵐映日吐還吞司空欲倣前朝制光武遺謀今尚存春日左闕門宴罷間坐掖舍即事宴罷宫門午漏遲掖垣花發萬年枝晴窗燕語黃金屋春水鷗眠碧玉池麗日垂輝薰細草東風無力曳遊絲微臣幸際清平世願播陽和及海涯春日恭送世宗梓宫赴山陵帝子乘龍去鼎湖空餘仙馭出皇都沙堤雨灑千官淚松壑風傳萬姓呼徒有燕姬悲甲館恨無方朔問蓬壺追思四十年來事只少東封按赤符自都門北望永陵有感破曉辭金殿衝寒出玉京中天日漸午西嶺雪初晴雲護園陵迥沙鋪輦路平先朝舊臣子哀感不勝情昌平州道中嵗晚昌平道肩輿百里程天臨赤縣近雪擁玉河平紫塞燕山路黃花漢將營壯哉此形勝坐遣萬方清曉發昌平州州據西山勝門臨北闕尊關河千里鎮煙火萬家村積雪容猶慘初陽景漸溫平生請纓志還擬扣天閽端陽前一日省中即事梅天雨初霽煙景尚依稀曲檻搖新緑髙簷送落暉吏從宫漏散鳥向御林歸來日滄江上龍舟競欲飛端陽後一日同省中諸丈遊陳戚畹别墅自憐詩骨懶朝參乞假登臨喜盍簪緑樹團隂多映水青山入曉半浮嵐坐中冠蓋人爭羡物外煙霞性所耽對景渾忘身是客依稀風物似江南喜甥韓進士存良入館選郎君早嵗即知名十載風塵祇自驚綵筆昔看稱獨步玉堂今喜冠羣英九重天向詞壇近五色雲從相國生少小同遊幸同宦一緘聊展渭陽情夏日同省中諸丈遊鄭氏山莊谷口人何在空餘别業存幽窗多鳥迹芳徑半苔痕掃石供棋局催花送酒樽投間此佳會暫逺市朝喧贈别王工部年丈改授南曹送君南去鳯凰臺江上秋風待客來雲樹暮連青嶂逺渚花寒映錦帆開六朝舊迹千年在萬里長江一帶回莫謂留都近間散先皇曽此屈羣材秋晚有懷吳中故人向晚長安道秋風思故人十年雞肋味終日馬蹄塵目送天邊鳥心懸湖上蓴山中舊相識安得更相親茅山道中喜晴積雨初收曙色分三山如畫斂輕雲花殘紫陌聞鶯語草長青郊走鹿羣本擬登臨同謝傅還期齋宿禮茅君華陽洞口神仙宅霞彩常成五色文七夕今夕何夕火西流處處穿針閲女牛銀燭光搖書幌冷碧梧影落帝城秋疏愚欲乞天孫巧迂逺空懷杞國憂坐久宴然清不寐絳河如練近南樓過徐相國舊宅有感相國門前鞍馬稀古槐斜帶夕陽微蟬聲滿樹秋風早寂寞朱簾燕雀飛贈别李侍御謫廬州漢世風裁説李膺看花曽伴曲江行一朝誤落城狐計千古應傳驄馬名淮海秋添遷客思廬江水似使君清休因去國違初志天子垂衣本聖明秋日都門送别有感為送南歸客翻憐北駐人白雲凝望逺華髮共愁新落日湖南橘秋風江上蓴何時返初服吾亦任吾真送董太僕歸省華亭十年抗節戍蠻荒仗劒歸來鬢未蒼赤膽朝天時共矚錦衣歸晝里生光秋髙淮海鴻飛逺月滿華亭鶴唳長知向故園晨省處好將萊綵慰髙堂重陽日與諸省丈都門晚集帝里逢佳節冠裳續勝遊登髙千古事清賞片時秋雨後金英綻杯中玉液浮醉餘扶上馬明月在簾鈎月夜醉歸漫興雨過天街夜氣清醉看明月逐人行更傳宫闕銅壺漏風送關山玉笛聲逆旅長年淹宦迹故鄉終日計歸程扁舟未遂江湖興蓴菜鱸魚空復情潞河舟中夜坐二首夜泊潞河驛朔風時送寒濤聲走沙磧月色映江干獨酌意何逺髙吟興未闌南歸嵗云暮白髮擬承歡暫解朝簪去還乘官舫行長風催客去孤月向人明行迹隨蓬轉歸心逐鴈征皇恩容乞假無復用陳情楊村夜泊維舟楊栁渡沙白亘長天犬吠孤村月烏啼落木煙微名真物外清賞足樽前秉燭還深坐宵分尚未眠曉發天津舟中有感篷窗簾影弄朝暉晨起遲遲懶著衣老去不知筋力改間來時覺鬢毛稀望中煙樹鄉心逺到處風波宦况微擬向五湖尋舊業蕭然松竹待人歸靜海道中晚眺向晚滄洲道舟行落照邉殘霞寒映水衰栁暮連天風靜布帆捲潮平錦纜牽客途可乘興沽酒用青錢流河道中阻風阻風蘆葦岸獨坐自通宵沙近寒聞鴈溪深夜落潮林昏煙景翳波湧月光搖客路瀕危險令人魂暗消晚發興濟縣蘭舟經海縣薄暮喜微風草帶寒煙白川迎落照紅殘雲歸逺戍孤鳥沒晴空無限東歸思憑欄一望中夜泊安林路出安林晚煙生野渡昏挑燈拈彩筆待月舉蘭樽帙散蠧魚走船驚宿鷺喧客心歸轉急飛夢到家園德州夜坐達旦倚棹雄州夜欲闌燈前重整鵕鸃冠星埀碧落懸珠綴月委澄波走玉盤雞唱忽傳更漏盡烏啼驚拂曉霜寒客心日夜東歸急對景翻嫌行路難武城懷古昔賢曽試宰茲地尚絃歌俗帶遺風古城臨流水多琴堂虛夜月祠屋長春蘿未暇薦蘋藻其如仰止何臨清晚眺地據京南勝州臨濟北雄河山齊魯舊風俗古今同煙栁連天碧霜楓夾岸紅到來維短棹沽酒夕陽中開河驛夜坐秋深仗劒出京華此夕經行汶水涯栁下酒香停客棹渡頭燈白近漁家天髙風送溪聲逺夜久簾埀月影斜醉後欲眠還起坐忍聽哀雁落寒沙舟中夜雨輕舟依野渡短褐坐深更千里鄉關思孤燈夜雨聲酒衝愁未散詩與夢俱清翻憶朝參日泥塗倩馬行留城懷古夜泊古留城河流接漢清昔人不可作兹地只留名祠帶寒煙色庭多落葉聲功成輕萬户千載仰髙情阻淺境山夜坐百里彭城道舟行滯淺沙波涵珠斗動樹帶絳河斜興到杯浮白更深燭吐花歸途已過半潦倒憶京華暮抵境山風帆飛驛路野燒動寒原霧翳林光黑煙籠水氣昏逺天收落景新月露微痕沙岸停橈處時聞雞犬喧曉發徐州曉發彭城驛舟迎水拍隄天連淮樹逺帆拂楚雲低雁向平沙起雞從夾岸啼江鄉行漸逺雅思欲幽棲經韓信舊城淮隂城久廢千載憶王孫古木愁雲起荒原落日昏路埋荆棘底碑雜蘚苔痕一飯曽圖報能忘返哺恩夜抵江都路入維揚郡江空星漢遙漁村寒映火荻岸夜聞潮雲斂瓜洲樹月明揚子橋自來歌舞地無復似前朝自江都晚抵儀真孤槎薄暮向江城千里江流一鏡平沙岸樹搖寒月影篷忩風送夜濤聲坐翻藝葉移時久間剪燈花達曙明三載離鄉今漸邇漫勞終日訃歸程江上阻風口占東風吹浪拍船頭江上寒雲繫客愁路近家山歸未得夢魂先已到長洲早行渡江畫舸風生錦纜開江光遙向日邉來煙消逺岸漁歌起水浸長天雁影回滄海潮平沒洲渚金山雲出護樓臺南來風景依然在祇歎年華鏡裏催嘉禾道中篷窗隱几夢初殘座上青山帶雨看幾處葦塘鳴翡翠誰家竹塢長琅玕煙林日落千村暮水國風生五月寒強欲披裘任疏懶扁舟長往弄漁竿舟次鳯凰山對月有感鳯凰山下繫孤舟坐愛氷輪湧碧流雨過栁塘涼入夜風生荻渚景疑秋鬢華老去知難再心赤年來愧未酬十載風霜淹宦轍凄涼風木使人愁月夜飲養翁相公山館黃閣辭榮早青山結社新不嫌車馬寂轉與鹿麋親入户雲千頃開窗月一輪蘭樽頻勸飲吐握意何真月夜泊千墩楊栁洲邊夜泊船月光如水散青天江村潮長諸溪滿林壑風生萬籟傳桑落杯乾猶強坐梅花帳冷不成眠良宵如此成虛度獨向篷窗檢舊編舟行三江口占萬頃滄浪映逺空布帆斜挂夕陽紅秋來每動江湖興擬著荷衣伴釣翁華蕩晚渡湖上冥冥落景催沙明石淨水縈洄殘霞飛映漁舟小蘆荻花中蕩槳來竹梧書舍曉起紅日三竿睡起遲幽棲原與性相宜滿庭落葉秋深後繞屋寒花興到時短褐漫同逋客散濁醪擬赴野人期一辭京國歸桑梓理亂經年總不知夜泊方橋橋偃秋波闊舟依夕岸斜香粳搗村杵亂竹護漁家霜後楓酣葉樽前燭吐花江湖足乘興無復憶京華曉發梁溪曉來風雨暗梁溪客子舟行路欲迷蘆岸近沙頻下雁漁村隔水逺聞雞蕭蕭落木連天暝渺渺寒煙拂地低自笑百年渾似寄萍蹤一任自東西舟中苦雨水國偏多雨篷窗日日隂江聲隨白浪煙景翳青林漁父茅茨濕鮫人窟宅深豐凶關國計對此獨沈吟曉發奣子浦䇿馬微行白下過歡迎無奈故人何玉堂學士風流劇蘭省仙郎逸興多千炬髙懸明月夜一樽同醉白雲阿别來幾度思君處間對澄江發浩歌寒食早行嘉禾道中半窗殘月送雞聲畫舸輕帆趁曉行楊栁溪橋煙未散杏花村落雨初晴路逢寒食成虛度坐對春山憶舊盟自笑狂夫真潦倒每因風物倍多情長橋月夜江城暮雨歇與客坐孤舟月照蘭樽夜風生荻岸秋空懷千古事因羡五湖遊烈士今何在長橋水自流夏日訪舊過太倉舟中對月獨酌蘭舟載琴鶴逺赴故人期碧海潮來疾青天月到遲波光簾外動樹影座間移獨酌娛清夜寧愁鬢欲絲送王司業同年北上三絶江上西風動客旌故人相對眼俱青一杯贈别休辭醉世路於今畏獨醒望中秋色滿吳鄉君去燕雲路渺茫别後倘承宣室問好將民困達君王雨過江城白苧秋行看仙客赴瀛洲平津延納君侯事不似相如已倦遊雨後獨坐漫興二絶西風吹雨動微寒隱几香消午夢殘聞説江湖可乘興扁舟散髮弄漁竿修竹千竿滿架書山忩無事稱間居由他世路風波惡獨掩柴扉日晏如晚過楓橋落日楓橋路船忩暮雨昏秋萍擁沙觜霜葉墜籬根山寺炊煙起江村宿鳥喧臨風思往事獨坐暗消魂秋日間居書感柴扉終日掩苔徑少人過中夜涼風發空階落葉多感時休浩歎對酒且髙歌百嵗浮生計渾如一擲梭舟過胥門書感旭日晴堪愛寒山青不收城臨伍相廟水落百花洲恥作依人鳥甘為浪迹鷗有懷千古恨空羡五湖遊晚過華蕩嵗晚江鄉路風生畫鷁輕坐看山色逺行愛練光明落日孤帆影寒沙一雁聲歸途趁明月不必憚宵征太宜人卧病兼程夜歸何事促歸心孤舟入夜深霜飛北堂冷日薄西山隂坐久時長嘯愁來還獨吟每思斷機訓不覺淚沾襟平望阻風風色晚來靜湖光時漸嘉逺山銜落日隔水映殘霞驛路船爭聚江橋酒易賖漁樵堪白首空復戀京華暮雪江天日暮雪漫漫四野風生玉宇寒幾處柴門煙火寂有人僵臥似袁安雪後雪後山川景倍嘉東郊初日弄煙霞幽人䇿蹇來相訪為道寒梅己放花春日與諸親友同過靈殿寺觀梅古寺梅花發開樽引興長賔朋盡嵇阮臺殿自齊梁疏影虛禪榻清芬灑客裳數杯沈醉後渾欲泛慈航落梅二月江村見落梅風飄花瓣玉成堆無端醉臥山窗下時有香魂入夢來春日間居方子靜過訪夫君久約在梅花過訪茅堂日未斜野店栁長懸酒斾水村船泊近漁家十年親舊渾如故一旦歡迎興未賖少壯同遊今皓首忍將衰鬢客天涯江村春暮三月江村路韶華已暮春水光晴弄日花氣暖宜人燕啄香芹去魚翻碧藻新間居與花鳥日日自相親嘗新茶雷震山原百草長金芽摘得未盈筐窗前鼎沸松風暖座上杯浮穀雨香對案總堪清客夢入脣猶足沁詩腸九重聞為求賢渴應擬星馳達上方春日方司訓過訪故人頻枉駕相對意俱忘門掩青春暮庭間白晝長日蒸花氣重風落燕泥香更擬通宵飲陶然入醉鄉春朝即事為愛連宵月朝來起較遲呼童煮新茗對客了殘棋花落清明後鳩鳴穀雨時初歸雙燕子似與主人期晚過陽城湖放棹過湖曲波淹落照紅栁煙低度水麥浪逺搖空暝色孤篷底間情一望中舟行時遣興沽酒問漁翁端陽日對雨小坐江郭逢端午軒忩風雨涼呼童收藥裹與客醉蒲觴入座榴花媚侵衣艾葉香追思當日事賜扇沐恩光夏日臥病村居幽棲仍臥病終日掩柴扉竹圃鶯啼倦苔階客到稀松風清入幕梅雨細沾衣向晚諸僮僕西郊種豆歸秋日寄髙大參省丈當年銓署並為郎此日天涯各一方鴈度吳江秋色逺思君不見斷人腸夏日胥江送客載酒餉行客江城水拍堤鳩呼山雨急龍出澗雲迷舟向天涯去帆從樹杪移自憐嬰世網不得遂幽棲贈别張郡理應召北上英妙終軍蚤棄繻吳中佐郡日懸魚秋風祖道仙蹤逺滿路棠隂拂使車贈别張明府二絶三載羈栖枳棘叢徴書逺下建章宫雙鳬飛向雲霄去花縣春來祇自紅長洲苑外動征車去後琴堂月色虛他日懷君無可問試從江水覔雙魚獨酌扁舟移海曲獨酌坐篷窗地僻人行少天髙鶴去雙棹歌聞别浦帆影落清江俯檻時長嘯雄心未肯降途中七夕七夕今宵是時將溽暑收人間青女月天上白榆秋金井梧飄葉銀河月墜鈎吳城方乞巧幾處倚南樓紫薇花為風雨所傷庭花爛熳十旬紅絶勝春英二月中底事夜來風雨惡胭脂零落粉牆東秋晚過城南别業不到城南久秋風動草堂空階梧墜葉别院桂生香鳥迹侵書牖蛛絲繞屋梁水亭清晏處隨意引壺觴十四夜與方司訓金進士臨水玩月玩月秋將半銜杯夜欲分瑤臺凝湛露碧落斂微雲魄湧中流影輝成五色文主人先客醉談笑未全聞北寺中秋夜感舊憶昔曾從此地遊月明如水正中秋雲消塔影當空落風送天香滿院流一瞬忽驚同輩少重來猶喜舊僧留當年風景依然在湖海馳驅欲白頭贈别宗給舍同年二首話别移孤棹江鄉秋色深風帆行客思杯酒故人心波漾殘霞影山銜落日隂醉餘將緑綺誰復是知音仙客去京華歸期正及瓜天髙溫省樹秋老禁園花擬向青蒲伏寧為白筆誇頗思同志者潦倒在天涯東樓曉起小樓人靜夜冥冥庭樹秋髙玉露零獨臥鴛衾偏覺冷半忩殘月酒初醒送丁明府同年之任陽信江湖秋水闊載酒餉丁鴻客去青天外帆飛落照中琴堂吟夜月花縣領春風别後思東魯絃歌處處同月下復抵婁城燈下獨酌長嘯篷窗興頗濃燈前獨酌自從容寒潮向晚回青海皓月通宵挂玉峰風度疏林聲淅淅煙籠衰栁影重重夜深鼓角城邊起醉夢虛疑長樂鐘贈别馮進士之任海陽江鄉水繞闔閭城嵗晚憐君嶺外行萬里風塵緣五斗一帆煙雨動雙旌路經梅嶺花爭發秋向琴堂月正明聞説潮陽近滄海鱷魚應避使君清曉渡漕湖隂雨三冬後湖田一望平風生帆勢疾日出浪花明野鶴摩霄迥沙鷗狎水輕篷窗獨凝眺坐覺晏然清雨忩與客夜話一局殘棋夜未央寒忩風雨客聨牀靜聽簷溜和愁滴間剔燈花引話長村巷煙昏鴉滿樹湖田水泛雁無梁何人肯倡蠲租議躍馬馳封入建章曉起與客同泛琴川蚤起乘殘月相攜有故人共登青雀舫逺過白鷗津海色侵窗曙霜華拂袂新坐忘軒冕慮落魄任吾真鯤溟詩集卷一
